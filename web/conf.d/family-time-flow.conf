# FamilyTimeFlow — nginx location fragment
# Deploy to /etc/nginx/conf.d/projects/family-time-flow.conf

location /family-time-flow/ {
    alias /usr/share/nginx/html/family-time-flow/;
    try_files $uri $uri/ /family-time-flow/index.html;
    add_header Cache-Control no-cache;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
}

location /family-time-flow/api/ {
    client_max_body_size 64k;
    rewrite ^/family-time-flow(/api/.*)$ $1 break;
    proxy_pass http://172.17.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 3s;
    proxy_read_timeout 15s;
}
