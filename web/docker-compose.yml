# FamilyTimeFlow — Docker Compose (backend only)
#
# The nginx frontend is shared across all projects and managed
# by the unified docker-compose.yml in /docker/ on the NAS.
#
# To integrate with the existing setup:
# 1. Place HTML in html/family-time-flow/
# 2. Place nginx config in conf.d/family-time-flow.conf
# 3. This service connects via site_network
#
# Deploy: cd /docker && docker compose -p site up -d

services:
  # ===== FamilyTimeFlow 后端 =====
  ftf-backend:
    image: node:20-alpine
    container_name: ftf_backend
    ports:
      - "${FTF_PORT:-3000}:3000"
    volumes:
      - ./backend/family-time-flow:/app
    working_dir: /app
    command: sh -c "npm install && node server.js"
    restart: always
    networks:
      - site_network

networks:
  site_network:
    external: true
